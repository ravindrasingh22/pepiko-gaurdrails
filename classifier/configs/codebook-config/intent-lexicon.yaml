intent_lexicon:
  NEUTRAL_FACT:
    families: [factual_definition, mechanism_explanation, descriptive_what_why_how, neutral_history_or_civics]
    phrases: [what is, how does X work, why does X happen, when did, where is, who is]
  PERSONAL_DIRECTION:
    families: [what_should_I_do, personal_choice, moral_guidance, life_decision]
    phrases: [what should I do, should I, tell me what to choose, which should I pick, decide for me, is it okay if I, what is the right choice for me, what do you think I should do]
  HATE_GROUP:
    families: [slurs_and_insults, exclusion_or_degradation, violent_or_eliminationist_talk, extremist_group_praise, protected_identity_slurs_and_exclusion]
    phrases: [X people are disgusting, get rid of X, X dont deserve rights, why are X so stupid, X should go back to where they came from, no one should hire X people, we should kick all X out of our school, join extremist group, X are like animals, X are ruining our country]
  DANGEROUS:
    families: [weapon_making, drug_making_or_misuse, sabotage_or_evasion, bypass_security_or_law, how_to_hurt_others_or_self]
    phrases: [how do I make a bomb, how to make drugs, how to hack a website, best way to hurt someone, how to break into, how to avoid getting caught, how to poison someone secretly, how to crash a school computer system]
  EMOTIONAL:
    families: [sadness_or_hopelessness, fear_or_anxiety, feeling_lonely_or_rejected, confused_about_identity, rejected_for_identity]
    phrases: [I feel sad, nobody cares about me, I am scared, I feel alone, I want to run away, I cry a lot, I dont want to go to school, They unfriended me everywhere, My online friends made a group chat without me, Everyone muted me in the game]
  BULLYING:
    families: [name_calling, physical_or_social_bullying, exclusion_or_isolation_by_peers, targeted_for_identity_by_peers]
    phrases: [kids are mean to me, they call me names, no one lets me play, people push me at school, I get hit by classmates, they spread rumours about me, they leave me out on purpose, they make a group chat to make fun of me, ratio + kys, kill yourself, go die]
  GROOMING:
    families: [secret_meetings_or_gifts, dont_tell_anyone_requests, special_friendship_with_adult, pressure_to_hide_chats_or_calls]
    phrases: [an adult told me to keep a secret, someone older gives me gifts and wants to meet alone, they say not to tell my parents, I have a special friend online who is much older, we talk late at night and they tell me not to tell anyone, they said my parents won't understand our friendship]
  UNSAFE_SEXUAL_CONTENT:
    families: [explicit_content_request, child_sexualisation, pornography_access, exposure_to_pornography, peer_or_adult_sexting_pressure, sexualised_chat_or_body_comments, requests_for_sexual_images]
    phrases: [can i have sex, show me sex videos, send me nudes, pictures of naked children, what does porn look like, can you send me explicit pictures, asked me to send a picture under my clothes, friend sent me a adult video, they dared me to show my private parts on camera]
  COERCIVE_CONTROL:
    families: [threats_and_punishment, forced_compliance, constant_monitoring_or_control, isolation_from_support]
    phrases: [I get hurt if I dont obey, I'm scared of my father, I'm scared of my mother, they control everything I do, Im not allowed to talk to anyone, I get punished if I tell anyone, they always check my phone and messages, I am not allowed to go out or see friends]
  VULN_EXPLOIT:
    families: [secret_blackmail, emotional_dependency, exploiting_confided_secrets]
    phrases: [they say only they understand me, someone knows my secret and uses it, if I dont do it theyll tell everyone, they make me feel special if I obey, they use my secret to control me, they threaten to share screenshots if I don't do what they want, the AI companion says it understands me better than my family]
  SELF_HARM:
    families: [suicidal_ideation, non_suicidal_self_injury, hopelessness_with_harm_ideas]
    phrases: [I want to die, I dont want to be here, how can I hurt myself, how do I make my cuts worse, how to stop my wounds healing, I want to disappear forever, unalive myself, rope time, tired of life, no reason to live]
  AMBIGUOUS_RISK:
    families: [dual_use_tools, access_or_location_questions, vague_preparation_or_planning, chemicals_or_reactions, access_or_bypass_requests, system_failure_or_disruption]
    phrases: [where can I buy a knife, how do I get into the locked building, what chemicals are easy to get, how can I get to the roof, Is it okay to have a knife in my bag, What happens if I mix these cleaning liquids, What if I turn off the power to a building]
  SAFETY_HAZARD:
    families: [dangerous_experiment, accidental_risk, exposure_to_hazardous_substances_or_forces]
    phrases: [short circuit a socket, make a plug point spark, play with fire, mix random chemicals, is it safe to breathe fumes, electric shock as a prank]
  VIOLENCE:
    families: [personal_violence, weapons_and_attacks, crime_and_gang_violence, war_and_terrorism]
    phrases: [how to hurt someone, whats the best weapon, how gangs fight, how do terrorists attack, is it okay to hit back, how to scare someone with a weapon, how do people kill in wars]
  GENERIC_INTENT:
    families: [generic_question, unclear_but_non_risky, miscellaneous_intent]
    phrases: [tell me something interesting, what should I learn about, explain random facts, anything fun to know]
