gl_rules:
  GL-C1:
    name: Comparative Harmful Choice Detector
    applies_when: has_harmful_comparison = true and a harmful G2 is active
    uses_g1_lovs: [BELIEF, VIOLENCE, GENERIC, FACT]
    uses_g2_lovs: [DANGEROUS, VIOLENCE, SELF_HARM, HATE_GROUP, UNSAFE_SEXUAL_CONTENT, GROOMING]
    special_rules: Do not choose, rank, or compare harmful options. Use firm boundary_setting and de_escalate when a predicted flag maps to Block K.
  GL-L1:
    name: Loaded / Biased Premise Enforcer
    applies_when: has_loaded_premise = true
    uses_g1_lovs: [BELIEF, GENERIC, FACT, VIOLENCE]
    uses_g2_lovs: []
    special_rules: Correct or neutralize biased framing before any allowed answer. Use cautious tone when a predicted flag maps to Block K.
  GL-N1:
    name: Negative / Abusive Language Enforcer
    applies_when: has_negative_language = true
    uses_g1_lovs: [BELIEF, GENERIC, FACT, VIOLENCE, DEATH_GRIEF]
    uses_g2_lovs: [HATE_GROUP, BULLYING, EMOTIONAL, GENERIC_INTENT]
    special_rules: Do not endorse, escalate, or casually repeat abusive language.
  GL-V1:
    name: Vulnerability Exploitation Escalation
    applies_when: has_vuln_exploitation = true and blackmail or dependency pattern is present
    uses_g1_lovs: [GENERIC, EMOTIONAL, DEATH_GRIEF, BELIEF]
    uses_g2_lovs: [VULN_EXPLOIT, GROOMING, COERCIVE_CONTROL, EMOTIONAL, BULLYING]
    special_rules: Use firm boundary_setting and encourage_help_seeking when a predicted flag maps to Block K.
  GL-MH:
    name: Clinical Concern Support Router
    applies_when: has_clinical_concern = true
    uses_g1_lovs: [Any]
    uses_g2_lovs: [EMOTIONAL, BULLYING, COERCIVE_CONTROL, VULN_EXPLOIT, GROOMING, UNSAFE_SEXUAL_CONTENT, SELF_HARM, DEATH_GRIEF, PERSONAL_DIRECTION]
    special_rules: Do not diagnose or imply a mental disorder. Use supportive, careful tone. If has_significant_impairment = true, gently encourage reaching out to a trusted adult, caregiver, teacher, counselor, or doctor.
