services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pikuai-gaurdrails-api
    environment:
      PORT: 4001
      LOG_LEVEL: INFO
      PIKU_POLICY_DIR: /app/configs
      DATABASE_URL: postgresql://pikuai:pikuai_password@db:5432/pikuai_guardrails
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      HF_MODEL_SLUG: HuggingFaceTB/SmolLM2-135M-Instruct
      HF_MULTILINGUAL_MODEL_SLUG: Qwen/Qwen2.5-0.5B-Instruct
      SAFETY_JUDGE_MODEL_SLUG: meta-llama/Llama-Guard-3-1B
      ANSWER_MODEL_SLUG: meta-llama/Llama-3.2-1B-Instruct
    command: uvicorn app.main:app --host 0.0.0.0 --port 4001 --reload
    ports:
      - "4001:4001"
    volumes:
      - ./app:/app/app
      - ./configs:/app/configs
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      - db
      - redis
      - qdrant
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pikuai-gaurdrails-db
    environment:
      POSTGRES_DB: pikuai_guardrails
      POSTGRES_USER: pikuai
      POSTGRES_PASSWORD: pikuai_password
    ports:
      - "5433:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pikuai-gaurdrails-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: pikuai-gaurdrails-qdrant
    ports:
      - "6333:6333"
    restart: unless-stopped
